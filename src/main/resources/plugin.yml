name: PolarAddon
version: 1.0.0
main: ro.puk3p.polaraddon.PolarAddonPlugin
api-version: "1.8"
author: Puk3p
description: Polar Anticheat addon plugin

# PolarLoader must be loaded before this plugin so the API is available
depend:
  - PolarLoader

commands:
  polar:
    description: PolarAddon staff commands (rotate / knockback / test / summon)
    usage: /polar <rotate|knockback|test|summon> <player> [blaze|skeleton]
    permission: polaraddon.use

permissions:
  polaraddon.use:
    description: Access to /polar command root (required alongside sub-permissions)
    default: op

  polaraddon.rotate:
    description: Force a player's head rotation (/polar rotate)
    default: op

  polaraddon.knockback:
    description: Apply a knockback impulse to a player (/polar knockback)
    default: op

  polaraddon.test:
    description: Apply random rotation and knockback to a player (/polar test)
    default: op

  polaraddon.summon:
    description: Spawn a KillAura test mob near a player (/polar summon)
    default: op
