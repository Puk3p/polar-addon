name: Build

on:
  push:
    branches: [ "**" ]
    tags-ignore: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build:
    name: Lint, Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polar-addon-${{ github.sha }}
          path: target/polar-addon-*.jar
          if-no-files-found: error
